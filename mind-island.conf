# Mind Island frontend nginx config (absolute backend URL mode)
# 当前模式：前端由Nginx监听3000端口，前端请求直接走 VITE_API_BASE_URL 绝对地址
# 使用方法：
# 1) 前端构建：cd dczzq && npm run build
# 2) 配置 dczzq/.env.production 中 VITE_API_BASE_URL 为后端绝对地址
# 3) 后端独立运行在 8000（或你的实际端口）
# 4) 将本文件放到 /etc/nginx/conf.d/mind-island.conf

server {
    listen 3000;
    server_name _;

    # 前端静态目录
    root /opt/mind-island/dist;
    index index.html;

    # gzip（可选）
    # gzip on;
    # gzip_comp_level 5;
    # gzip_min_length 1024;
    # gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Vue history 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri $uri/ /index.html;
    }
}

# 若要启用HTTPS，可复制该server块并改为 listen 443 ssl http2。
